# Celina stack via Docker Compose.
#
# PRECONDITIONS ON THE HOST:
#   1. `onchainos` CLI installed at ${HOME}/.local/bin/onchainos (the standard
#      path used by the OKX Developer Portal installer).
#   2. `onchainos wallet login` has already run on the host, so the TEE keyring
#      + account list live in ${HOME}/.onchainos/. This directory is mounted
#      read-only into the signing containers; they reuse the host's wallet
#      state rather than re-authenticating inside the container.
#   3. `.env` at the repo root is populated (OKX_*, GROQ_API_KEY,
#      CONSUMER_*, PRODUCER_*, SUBAGENT_*).
#   4. All three accounts are funded on X Layer: Consumer 5-10 USDG,
#      Sub-agent ~1 USDG, Producer 0 USDG (it only receives).
#
# The Dashboard container does not mount the onchainos binary because it only
# reads the shared SQLite file and calls the OKX MCP server for balances.

services:
  producer:
    build:
      context: .
      target: producer
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      APP_DB_PATH: /app/data/app.db
    volumes:
      - db_data:/app/data
      - ${HOME}/.local/bin/onchainos:/usr/local/bin/onchainos:ro
      - ${HOME}/.onchainos:/root/.onchainos
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  subagent:
    build:
      context: .
      target: subagent
    ports:
      - "3003:3003"
    env_file: .env
    environment:
      APP_DB_PATH: /app/data/app.db
      PRODUCER_URL: http://producer:3001
    volumes:
      - db_data:/app/data
      - ${HOME}/.local/bin/onchainos:/usr/local/bin/onchainos:ro
      - ${HOME}/.onchainos:/root/.onchainos
    depends_on:
      producer:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  consumer:
    build:
      context: .
      target: consumer
    ports:
      - "3002:3002"
    env_file: .env
    environment:
      APP_DB_PATH: /app/data/app.db
      PRODUCER_URL: http://producer:3001
      SUBAGENT_URL: http://subagent:3003
    volumes:
      - db_data:/app/data
      - transformers_cache:/app/.transformers-cache
      - ${HOME}/.local/bin/onchainos:/usr/local/bin/onchainos:ro
      - ${HOME}/.onchainos:/root/.onchainos
    depends_on:
      producer:
        condition: service_healthy
      subagent:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  dashboard:
    build:
      context: .
      target: dashboard
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      APP_DB_PATH: /app/data/app.db
    volumes:
      - db_data:/app/data
    depends_on:
      consumer:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
  transformers_cache:
